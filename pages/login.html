<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoftWars - Iniciar Sesión</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/login.css">
    <link rel="icon" type="image/svg" href="../img/CENFOTEC-FAVICON.svg">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h2>Iniciar Sesión</h2>
            <form id="form-login">
                <div class="input-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" required>
                </div>
                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit" class="btn-primary">Ingresar</button>
            </form>
            
            <div class="login-actions">
                <!-- HU-03 y HU-04 -->
                <a href="#" id="link-verify">Verificar Cuenta</a>
                <a href="#" id="link-forgot-pass">¿Olvidaste tu contraseña?</a>
            </div>
        </div>
    </div>
    
    <!-- Lógica de validación e integración -->
    <script src="js/data-store.js"></script>
    <script src="js/validaciones.js"></script>
    <script src="js/login-logic.js"></script>
</body>
</html>
