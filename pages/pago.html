<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pago</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/pago.css">
</head>
<body>

    <div class="pago-overlay">
        <div class="pago-card">

            <!-- Ícono superior -->
            <div class="pago-icon">
                <span>&#10095;</span>
            </div>

            <!-- Número de tarjeta -->
            <div class="pago-field">
                <label>Número de tarjeta:</label>
                <input type="text" placeholder="">
            </div>

            <!-- Nombre -->
            <div class="pago-field">
                <label>Nombre (como figura en la tarjeta):</label>
                <input type="text" placeholder="">
            </div>

            <!-- Vencimiento + CVV -->
            <div class="pago-row">
                <div class="pago-field">
                    <label>Vencimiento:</label>
                    <div class="pago-expiry">
                        <select>
                            <option>01</option>
                            <option>02</option>
                            <option>03</option>
                            <option>04</option>
                            <option>05</option>
                            <option>06</option>
                            <option>07</option>
                            <option>08</option>
                            <option>09</option>
                            <option selected>10</option>
                            <option>11</option>
                            <option>12</option>
                        </select>
                        <select>
                            <option>2024</option>
                            <option>2025</option>
                            <option>2026</option>
                            <option>2027</option>
                            <option>2028</option>
                            <option>2029</option>
                            <option selected>2020</option>
                        </select>
                    </div>
                </div>

                <div class="pago-field pago-cvv">
                    <label>Código de verificación:</label>
                    <input type="text" placeholder="CVV">
                </div>
            </div>

            <!-- Botón confirmar -->
            <button class="pago-btn">CONFIRMAR</button>

        </div>
    </div>

</body>
</html>
